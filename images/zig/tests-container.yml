---
version:
  command: |
    version=$(< "${TEST_DISTRO:?}/${TEST_VARIANT:?}/VERSION")
    expected="${version}"
    result=$(test_engine_run --rm "${TEST_IMAGE:?}" zig version)
    grep "${expected}" <<< "${result}" || test_fail "Expected '${expected}', got '${result}'"

smoke:
  command: |
    out=$(test_engine_run --rm "${TEST_IMAGE:?}" zig --help)
    grep -q 'Usage' <<< "${out}" || test_fail "Unexpected zig --help output: ${out}"

    out=$(test_engine_run --rm "${TEST_IMAGE:?}" zig version)
    [[ -n "${out}" ]] || test_fail "zig version returned empty output"

smoke-builder:
  filters:
    variants: [builder]
  command: |
    out=$(test_engine_run --rm "${TEST_IMAGE:?}" bash -c 'gdb --help')
    grep -q 'This is the GNU debugger' <<< "${out}" || test_fail "Unexpected gdb --help output: ${out}"

build:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.zig
    const std = @import("std");
    pub fn main() void {
        std.debug.print("Hello, Zig!\n", .{});
    }
    EOF

    test_engine_run --rm -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" zig build-exe hello.zig

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGE:?}" ./hello)
    [[ "${out}" == "Hello, Zig!" ]] || test_fail "Unexpected output from hello program, got: ${out}"

build-unprivileged:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.zig
    const std = @import("std");
    pub fn main() void {
        std.debug.print("Hello, Zig!\n", .{});
    }
    EOF

    test_engine_run --rm --user 65532 -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" zig build-exe hello.zig

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGE:?}" ./hello)
    [[ "${out}" == "Hello, Zig!" ]] || test_fail "Unexpected output from hello program, got: ${out}"
