---
version:
  command: |
    version=$(< "${TEST_DISTRO:?}/${TEST_VARIANT:?}/VERSION")
    expected="gcc (GCC) ${version}"
    result=$(test_engine_run --rm "${TEST_IMAGE:?}" gcc --version)
    grep "${expected}" <<< "${result}" || test_fail "Expected '${expected}', got '${result}'"

smoke:
  command: |
    out=$(test_engine_run --rm "${TEST_IMAGE:?}" gcc --help)
    grep -q 'Usage: gcc' <<< "${out}" || test_fail "Unexpected gcc --help output: ${out}"

    out=$(test_engine_run --rm "${TEST_IMAGE:?}" g++ --help)
    grep -q 'Usage: g++' <<< "${out}" || test_fail "Unexpected g++ --help output: ${out}"

    out=$(test_engine_run --rm "${TEST_IMAGE:?}" make --version)
    grep -q 'GNU Make' <<< "${out}" || test_fail "Unexpected make --version output: ${out}"

smoke-builder:
  filters:
    variants: [builder]
  command: |
    out=$(test_engine_run --rm "${TEST_IMAGE:?}" bash -c 'gdb --help')
    grep -q 'This is the GNU debugger' <<< "${out}" || test_fail "Unexpected gdb --help output: ${out}"

build:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.c
    #include <stdio.h>
    int main(void) {
        printf("Hello, World!\n");
        return 0;
    }
    EOF

    test_engine_run --rm -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" gcc -o hello hello.c

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGES[core-runtime/default]:?}" ./hello)
    [[ "${out}" == "Hello, World!" ]] || test_fail "Unexpected output from hello program, got: ${out}"

build-cpp:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.cpp
    #include <iostream>
    int main() {
        std::cout << "Hello, C++!" << std::endl;
        return 0;
    }
    EOF

    test_engine_run --rm -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" g++ -o hello hello.cpp

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGES[core-runtime/default]:?}" ./hello)
    [[ "${out}" == "Hello, C++!" ]] || test_fail "Unexpected output from hello program, got: ${out}"

build-makefile:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.c
    #include <stdio.h>
    int main(void) {
        printf("Hello, Make!\n");
        return 0;
    }
    EOF

    cat <<'MAKEFILE' > "${TMPDIR}"/Makefile
    CC ?= gcc
    CFLAGS ?= -Wall -Wextra

    hello: hello.c
    	$(CC) $(CFLAGS) -o $@ $<

    .PHONY: clean
    clean:
    	rm -f hello
    MAKEFILE

    test_engine_run --rm -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" make

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGES[core-runtime/default]:?}" ./hello)
    [[ "${out}" == "Hello, Make!" ]] || test_fail "Unexpected output from hello program, got: ${out}"

build-unprivileged:
  command: |
    TMPDIR=$(mktemp -d)
    chmod 777 "${TMPDIR}"
    trap 'podman unshare rm -rf "${TMPDIR}" 2>/dev/null || rm -rf "${TMPDIR}" 2>/dev/null || true' EXIT

    cat <<EOF > "${TMPDIR}"/hello.c
    #include <stdio.h>
    int main(void) {
        printf("Hello, World!\n");
        return 0;
    }
    EOF

    test_engine_run --rm --user 65532 -v "${TMPDIR}":/src:z -w /src "${TEST_IMAGE:?}" gcc -o hello hello.c

    out=$(test_engine_run --rm -v "${TMPDIR}":/app:ro,z -w /app "${TEST_IMAGES[core-runtime/default]:?}" ./hello)
    [[ "${out}" == "Hello, World!" ]] || test_fail "Unexpected output from hello program, got: ${out}"
